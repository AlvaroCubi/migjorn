name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]*"

env:
    CARGO_TERM_COLOR: always

jobs:
    # ──────────────────────────────────────────────
    # 1. Publish crates to crates.io (syntax first, then the flagship crate)
    # ──────────────────────────────────────────────
    publish-crate:
        name: Publish to crates.io
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Set version from tag
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  # Bumps both workspace.package.version and the versioned
                  # workspace path-dep on migjorn-syntax (both live in Cargo.toml).
                  sed -i "s/version = \"[0-9][0-9.]*\"/version = \"$VERSION\"/g" Cargo.toml
                  cargo update --workspace

            - name: Publish migjorn-syntax, then migjorn
              env:
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
              run: |
                  cargo publish -p migjorn-syntax --allow-dirty
                  # crates.io index is eventually consistent; retry the dependent
                  # crate until migjorn-syntax's new version is resolvable.
                  for i in 1 2 3 4 5 6; do
                    if cargo publish -p migjorn --allow-dirty; then exit 0; fi
                    echo "migjorn publish failed (attempt $i); waiting for index…"
                    sleep 30
                  done
                  exit 1

    # ──────────────────────────────────────────────
    # 2. Build Python wheels for each platform
    # ──────────────────────────────────────────────
    build-wheels:
        name: Build wheels (${{ matrix.os }}-${{ matrix.target }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64
                    - os: ubuntu-latest
                      target: aarch64
                    - os: macos-latest
                      target: x86_64
                    - os: macos-latest
                      target: aarch64
                    - os: windows-latest
                      target: x86_64

        steps:
            - uses: actions/checkout@v4

            - name: Set version from tag
              shell: bash
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  if [[ "$RUNNER_OS" == "macOS" ]]; then
                    sed -i '' "s/version = \"[0-9][0-9.]*\"/version = \"$VERSION\"/g" Cargo.toml
                  else
                    sed -i "s/version = \"[0-9][0-9.]*\"/version = \"$VERSION\"/g" Cargo.toml
                  fi

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Build wheels
              uses: PyO3/maturin-action@v1
              with:
                  target: ${{ matrix.target }}
                  # pyproject.toml lives in the binding crate, not the repo root.
                  working-directory: crates/migjorn-py
                  args: --release --out dist
                  manylinux: auto

            - name: Upload wheels
              uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}-${{ matrix.target }}
                  path: crates/migjorn-py/dist

    # ──────────────────────────────────────────────
    # 3. Build the sdist (source dist)
    # ──────────────────────────────────────────────
    build-sdist:
        name: Build sdist
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set version from tag
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  sed -i "s/version = \"[0-9][0-9.]*\"/version = \"$VERSION\"/g" Cargo.toml

            - name: Build sdist
              uses: PyO3/maturin-action@v1
              with:
                  command: sdist
                  working-directory: crates/migjorn-py
                  args: --out dist

            - name: Upload sdist
              uses: actions/upload-artifact@v4
              with:
                  name: sdist
                  path: crates/migjorn-py/dist

    # ──────────────────────────────────────────────
    # 4. Publish wheels + sdist to PyPI (Trusted Publishing)
    # ──────────────────────────────────────────────
    publish-pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: [build-wheels, build-sdist]
        environment: pypi
        permissions:
            id-token: write # for Trusted Publishing (OIDC) — no token secret needed
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
