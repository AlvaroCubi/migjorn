[workspace]
members = ["migjorn", "migjorn-py"]
resolver = "2"

[workspace.package]
version = "0.1.0"
authors = ["Alvaro Cubi <alvaro.cubi.ricart@gmail.com>"]
edition = "2024"
license = "EUPL-1.2"
repository = "https://github.com/Fusion4Energy/migjorn"

[profile.release]
# debug = true  # Activate debug symbols when profiling
strip = true # Remove symbols to reduce binary size
lto = true   # Enable Link Time Optimization for better performance
